
<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Angry Hamster Survival Guide</title>

<style>
body {
    background: #080808;
    color: #eeeeee;
    font-family: "Courier New", monospace;
    text-align: center;
    padding: 20px;
}

.container {
    max-width: 700px;
    margin: auto;
    background: #111;
    border: 3px solid #ffb6d9;
    padding: 25px;
    box-shadow: 0 0 25px #ffb6d9;
}

h1 {
    color: #ffb6d9;
    text-shadow: 0 0 12px #ffb6d9;
}

.warning {
    color: orange;
    font-size: 20px;
    font-weight: bold;
}

img {
    max-width: 100%;
    margin: 20px 0;
    border: 3px solid white;
}

button {
    background: red;
    color: white;
    border: none;
    padding: 15px 25px;
    margin: 10px;
    font-size: 18px;
    cursor: pointer;
    border-radius: 8px;
}

button:hover {
    background: darkred;
}

#instruction {
    margin-top: 25px;
    min-height: 70px;
    color: #00ff00;
    font-size: 18px;
}

.counter {
    color: gray;
    margin-top: 20px;
}


/* Halaus-GIF koko ruudulle */
#emergencyGif {
    display: none;
    position: fixed;
    z-index: 9998;
    inset: 0;
    width: 100vw;
    height: 100vh;
    background: black;
    justify-content: center;
    align-items: center;
}

#emergencyGif img {
    width: 100%;
    height: 100%;
    max-width: none;
    max-height: none;
    margin: 0;
    border: none;
    object-fit: contain;
}

/* Satunnainen yllätys-GIF koko ruudulle */
#randomGifOverlay {
    display: none;
    position: fixed;
    z-index: 9999;
    inset: 0;
    width: 100vw;
    height: 100vh;
    background: black;
    justify-content: center;
    align-items: center;
}

#randomGifImage {
    width: 100%;
    height: 100%;
    max-width: none;
    max-height: none;
    margin: 0;
    border: none;
    object-fit: contain;
}
</style>

</head>

<body>

<div class="container">

<h1>SURVIVAL GUIDE FOR NKR</h1>

<p class="warning">
THREAT LEVEL: EXTREME
</p>

<p>
Selviytymisjärjestelmä keski-ikäiselle Lochnessulle.<br>
Noudata ohjeita, säästyt konflikteilta ja epämiellyttäviltä tilanteilta. 
</p>

<img src="giphy.gif" alt="Angry Hamster">

<br>

<button onclick="giveInstruction()">
ANNA OHJE
</button>

<button onclick="activateEmergency()">
AKTIVOI HALAUS
</button>

<div id="instruction">
Paina nappia vastaanottaaksesi ohje
</div>

<div class="counter">
Vastaanotettuja ohjeita: <span id="count">0</span>
</div>
<img id="surpriseGif"
     src=""
     alt="Yllätys-GIF"
     style="display:none; max-width:100%; margin-top:20px;">
</div>


<!-- Piilotettu yllätys-GIF -->

<div id="emergencyGif">
    <img src="marcus-the-worm-robert-help.gif" alt="Halaus-GIF">
</div>

<div id="randomGifOverlay">
    <img id="randomGifImage" alt="">
</div>


<script>

const instructions = [
"Älä koskaan katso hamsteria silmiin yli kolmea sekuntia.",
"Tarjoa siemeniä ennen kuin tarjoat mielipiteitä.",
"Jos kuulet vihaista vinkunaa, olet jo myöhässä.",
"Älä mainitse sanaa \"rauhoitu\". Se pahentaa tilannetta.",
"Pidä vähintään kahden metrin turvaväli, jos sinulle siristetään silmiä.",
"Älä koske hätäsiemenvarastoon.",
"Pakkaa tavarasi ja peräänny rauhallisesti.",
"Älä tee äkillisiä liikkeitä tai huonoja vitsejä.",
"Hamsteri ei ole vihainen sinulle. Hamsteri on vihainen käsitteelle \"maanantai\".",
"Jos hamsteri näyttää iloiselta, kyseessä voi olla ansa.",
"Viha ei häviä. Se vaihtaa vain kohdetta.",
"Älä koskaan sano: \"Mikä noin pientä eläintä voi ärsyttää?\"",
"Älä väittele Hamsterin kanssa internetissä.",
"Nyökkää kohteliaasti, vaikka et ymmärtäisi motiiveja.",
"Älä syö viimeistä siementä.",
"Pidä aina hätäsiemen taskussa.",
"Kaikki valitukset ja toiveet voi toimittaa. Niitä ei käsitellä.",
"Koodi Punainen: joku alkoi jakamaan neuvoja.",
"Älä kysy Hamsterilta miksi. Hamsteri tietää miksi.",
"Tiedän missä asut.",
"Pidä rauhallinen ääni, epävarmuuden voi haistaa.",
"Älä koskaan koske punaiseen nappiin ilman lupaa.",
"Tämä linkki asensi laitteellisi viruksen",
"Olet kehittynyt. Todisteita ei toimiteta.",
"Huonoa makua ei voi parantaa, se on vain myönnettävä ja hyväksyttävä.",
"Henkilökohtainen ohje: jatka olemista. Se on tähän asti toiminut.",
"Saat luvan ottaa yhden herkun.",
"SINULLA on iso otsa.",
"Mene vaikka uimaan.",
"Olet hyvä. Ainakin historiassa.",
" *Laiton uhkaus* ",
"Sinut luokiteltiin \"odotettua paremmaksi\" .",
"Poikkeama havaittu: käyttäjä käyttäytyi järkevästi.",
"Tilanneraportti: olet onnistunut välttämään tarpeettoman paniikin.",
"Tänään et ole hamsterin suurin huolenaihe.",
"Sinussa on potentiaalia.",
"Analyysi osoittaa, että sinusta on enemmän hyötyä kuin haittaa.",
"Suoriuduit tilanteesta ilman ylimääräistä draamaa.",
"Keskiajalla kynttilöiden määrä juhlapöydässä kertoi usein isännän varallisuudesta. Vink vink.",
"Hereford Mappa Mundi -kartassa itä on ylhäällä, eli yhtä typerä systeemi kuin Turussa.",
"Ensimmäiset mekaaniset kellot ilmestyivät Euroopan kaupunkeihin 1200–1300-luvuilla. Sinä et silti omista sellaista.",
"Napoleonia vastaan taistelleet sotilaat eivät koskaan nähneet Eiffel-tornia. D44 se rakennettiin vasta myöhemmin."
    
    
    
];

const surpriseGifs = [
    "giphy-shy.gif",
    "giphy-stupid.gif"
];

let count = 0;

function giveInstruction() {
    const instructionBox = document.getElementById("instruction");
    const overlay = document.getElementById("randomGifOverlay");
    const image = document.getElementById("randomGifImage");

    // 5 % mahdollisuus näyttää yllätys-GIF.
    if (Math.random() < 0.05) {
        const randomGif =
            surpriseGifs[Math.floor(Math.random() * surpriseGifs.length)];

        // Tyhjentäminen käynnistää GIF-animaation uudelleen.
        image.src = "";
        image.src = randomGif;

        overlay.style.display = "flex";
        instructionBox.textContent = "ERIKOISTAPAHTUMA HAVAITTU";

        setTimeout(function () {
            overlay.style.display = "none";
            image.src = "";
        }, 2000);
    } else {
        const random =
            Math.floor(Math.random() * instructions.length);

        instructionBox.textContent = instructions[random];
    }

    count++;
    document.getElementById("count").textContent = count;
}

function activateEmergency() {

    let gif = document.getElementById("emergencyGif");

    gif.style.display = "flex";

    setTimeout(function() {
        gif.style.display = "none";
    }, 3000);

}

</script>

</body>
</html>
